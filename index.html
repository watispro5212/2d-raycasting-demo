<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            padding: 0px;
            margin: 0px;
            user-select: none;
            background-color: rgb(222, 222, 222);
        }

        #myCanvas {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: solid;
            border-width: 1.5px;
            border-radius: 4px;
            border-color: black;
        }
    </style>
</head>

<body>
    <canvas id="myCanvas"></canvas>
    <script src="dist/bundle.js"></script>
</body>

</html>
