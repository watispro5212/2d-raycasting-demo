<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            padding: 0px;
            margin: 0px;
            user-select: none;
            background-color: rgb(222, 222, 222);
        }

        .container {
            position: absolute;
            top: 0px;
            left: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        #myCanvas {
            border: solid;
            border-width: 1.5px;
            border-radius: 4px;
            border-color: black;
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas id="myCanvas"></canvas>
    </div>

    <script src="dist/bundle.js"></script>
</body>

</html>
